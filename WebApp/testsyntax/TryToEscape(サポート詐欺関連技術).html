<meta charset="utf-8">
<h1 style="color:lime;background-color: aquamarine;" id="msg1">
    CLICK HERE!
</h1>
<h1 style="color:maroon;background-color: fuchsia;display:none;" id="msg2">
    TRY TO ESCAPE!
</h1>


<script>
    document.documentElement.addEventListener("click", () => {
        document.documentElement.requestFullscreen();
        console.log("requestFullscreen()発動！");
        document.documentElement.style.cursor ="none"; ;
        navigator.keyboard.lock();
        // navigator.keyboard.lock(["KeyW", "KeyA", "KeyS", "KeyD","Escape"]);
        document.querySelector("#msg1").style.display = "none";
        document.querySelector("#msg2").style.display = "block";
    });
    document.addEventListener("keydown", (event) => {
        console.log(`event.key=${event.key}; event.code=${event.code}`);
    });

</script>
