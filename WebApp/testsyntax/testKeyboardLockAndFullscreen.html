<meta charset="UTF-8">
<h1 style="color:lime;background-color: aquamarine;">
    TESTHELLO!
</h1>

<script>
    document.documentElement.addEventListener("click", () => {
        document.documentElement.requestFullscreen();
        console.log("requestFullscreen()発動！");
        document.documentElement.style.cursor ="none"; ;
        navigator.keyboard.lock(["KeyW", "KeyA", "KeyS", "KeyD","Escape"]);
        
    });
    document.addEventListener("keydown", (event) => {
        if (event.code === "KeyW") {
            console.log("Wキーが押されました");
        } else if (event.code === "KeyA") {
            console.log("Aキーが押されました");
        } else if (event.code === "KeyS") {
            console.log("Sキーが押されました");
        } else if (event.code === "KeyD") {
            console.log("Dキーが押されました");
        } else if (event.code === "Escape") {
            console.log("Escapeキーが押されました");
        }
    });

</script>
